version: "3.8"

services:
  timescale_db:
    image: timescale/timescaledb:latest-pg16
    container_name: timescale_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_PASSWORD=timescale
      - POSTGRES_USER=timescale
      - POSTGRES_DB=wearipedia
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - timescale_data:/var/lib/postgresql/data

  etl:
    build:
      context: ./etl
    container_name: etl_service
    restart: on-failure
    depends_on:
      - timescale_db
    environment:
      - DB_HOST=timescale_db
      - DB_PORT=5432
      - DB_NAME=wearipedia
      - DB_USER=timescale
      - DB_PASSWORD=timescale
      - IS_SYNTHETIC=True
      - CLIENT_ID="" 
      - CLIENT_SECRET="" 
      - ACCESS_TOKEN=""

volumes:
  timescale_data: